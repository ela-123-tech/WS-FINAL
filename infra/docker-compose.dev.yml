services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tripgen
      POSTGRES_PASSWORD: tripgen
      POSTGRES_DB: tripgen
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripgen -d tripgen"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - pg_data:/var/lib/postgresql/data

  selenium:
    image: selenium/standalone-chrome:latest
    shm_size: 2gb
    ports:
      - "4444:4444"

  nominatim:
    image: mediagis/nominatim:4.4
    hostname: nominatim
    environment:
      PBF_PATH: /nominatim/data/region.osm.pbf
      NOMINATIM_PASSWORD: nominatim
    ports:
      - "8080:8080"
    shm_size: 1gb
    volumes:
      - nominatim_data:/var/lib/postgresql/14/main
      - ./nominatim:/nominatim/data

  backend:
    build:
      context: ../backend
    environment:
      DATABASE_URL: postgresql+psycopg://tripgen:tripgen@postgres:5432/tripgen
      CORS_ORIGINS: http://localhost:5173
      NOMINATIM_BASE_URL: http://nominatim:8080
      NOMINATIM_USER_AGENT: "TripGenFullstack/1.0 (contact: workforus321@gmail.com)"
      NOMINATIM_EMAIL: "workforus321@gmail.com"
      GTFS_URL: "https://passio3.com/ozark/passioTransit/gtfs/google_transit.zip"
      SCRAPING_ENABLED: "false"
      SELENIUM_REMOTE_URL: http://selenium:4444/wd/hub
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      nominatim:
        condition: service_started

  frontend:
    build:
      context: ../frontend
    environment:
      VITE_API_BASE_URL: ""
      VITE_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pg_data:
  nominatim_data:
